# HD CyCIF NOX1 analysis pipeline (v5).
# Two environments are used — see README.md. This file describes the main segmentation/
# typing/analysis environment; a CUDA-enabled PyTorch build and the companion `cynif`
# package are installed separately (not pinnable here).

name: cynif
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - cellpose==4.1.1        # Cellpose-SAM
      # torch==2.12.0 with CUDA — install from the PyTorch CUDA index, e.g.:
      #   pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cu130
      - scikit-image==0.26.0
      - scikit-learn==1.9.0
      - scipy==1.17.1
      - numpy==2.4.6
      - pandas==2.3.3
      - matplotlib==3.10.9
      - tifffile==2026.3.3
      - openpyxl>=3.1

